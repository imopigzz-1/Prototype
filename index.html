<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI会议原型生成器 </title>
    <!-- 引入 Tailwind CSS 让界面更好看 -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans overflow-hidden">

    <!-- 顶部导航栏 -->
    <header class="bg-blue-600 text-white p-3 md:p-4 shadow-md flex flex-col md:flex-row justify-between items-center z-10 space-y-3 md:space-y-0 shrink-0">
        <div class="flex items-center space-x-2 w-full md:w-auto justify-center md:justify-start">
            <span class="text-2xl">🚀</span>
            <h1 class="text-lg md:text-xl font-bold truncate">AI会议原型生成器</h1>
        </div>
        <div class="flex flex-col md:flex-row items-center w-full md:w-auto space-y-2 md:space-y-0 md:space-x-3">
            <div class="flex flex-row md:flex-col items-center md:items-start w-full md:w-auto justify-between md:justify-start gap-2">
                <label class="text-xs text-blue-200 whitespace-nowrap">API 代理接口:</label>
                <!-- 【改动点 1】在此处加入了 value 属性，默认填入你的接口，且允许随时修改 -->
                <input type="text" id="apiUrl" value="http://1.95.142.151:3000/v1" placeholder="如: http://1.95.142.151:3000/v1" class="flex-1 md:flex-none text-black px-2 py-1.5 rounded md:w-48 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
            </div>
            <div class="flex flex-row md:flex-col items-center md:items-start w-full md:w-auto justify-between md:justify-start gap-2">
                <label class="text-xs text-blue-200 whitespace-nowrap">Claude 密钥:</label>
                <input type="password" id="apiKey" placeholder="sk-ant-..." class="flex-1 md:flex-none text-black px-2 py-1.5 rounded md:w-48 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
            </div>
        </div>
    </header>

    <!-- 主工作区 -->
    <div class="flex-1 flex flex-col md:flex-row overflow-y-auto md:overflow-hidden p-3 md:p-4 space-y-4 md:space-y-0 md:space-x-4">

        <!-- 左侧：输入与控制面板 -->
        <div class="w-full md:w-1/3 flex flex-col space-y-3 bg-white p-4 rounded-lg shadow border border-gray-100 shrink-0 md:shrink">
            <h2 class="font-bold text-gray-800 text-lg flex items-center">📝 需求提炼区</h2>

            <div class="flex space-x-2">
                <!-- 录音按钮 -->
                <button id="recordBtn" class="flex-1 bg-red-50 py-2 rounded-md text-red-600 font-medium hover:bg-red-100 transition-colors flex items-center justify-center border border-red-200 text-sm">
                    <span id="recordIcon" class="mr-1">🎙️</span>
                    <span id="recordText">语音录入</span>
                </button>
                <!-- 提炼按钮 -->
                <button id="refineBtn" class="flex-1 bg-purple-50 py-2 rounded-md text-purple-600 font-medium hover:bg-purple-100 transition-colors flex items-center justify-center border border-purple-200 text-sm">
                    <span id="refineIcon" class="mr-1">🤖</span>
                    <span id="refineText">AI 梳理纪要</span>
                </button>
            </div>

            <p class="text-xs text-gray-400">口述完流水账后，点击<span class="text-purple-500 font-bold">【AI 梳理纪要】</span>让大模型自动提炼出结构化的需求文档。</p>

            <textarea id="minutes" class="flex-1 min-h-[150px] md:min-h-0 border border-gray-300 p-3 rounded-md resize-none focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-gray-700 leading-relaxed text-sm md:text-base" placeholder="您可以直接录音，或者在此输入口语化的会议记录..."></textarea>

            <button id="generateBtn" class="bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-md font-bold text-base md:text-lg transition-colors shadow-md flex justify-center items-center">
                ✨ 召唤 Claude 生成原型
            </button>
        </div>

        <!-- 右侧：预览与代码展示区 -->
        <div class="w-full md:w-2/3 min-h-[500px] md:min-h-0 flex flex-col bg-white p-4 rounded-lg shadow border border-gray-100 relative">
            <div class="flex justify-between items-center mb-3">
                <h2 class="font-bold text-gray-800 text-lg">💻 原型预览</h2>
                <div class="space-x-4 text-sm">
                    <button id="tabPreview" class="text-blue-600 font-bold border-b-2 border-blue-600 pb-1 px-1">可视化视图</button>
                    <button id="tabCode" class="text-gray-500 hover:text-blue-600 pb-1 px-1">HTML源码</button>
                </div>
            </div>

            <!-- 加载动画 -->
            <div id="loading" class="hidden flex-1 flex-col items-center justify-center text-gray-500 bg-gray-50 rounded-md border border-dashed border-gray-300 p-4 text-center">
                <div class="animate-spin rounded-full h-10 w-10 md:h-12 md:w-12 border-b-4 border-blue-600 mb-4"></div>
                <p id="loadingText" class="text-base md:text-lg font-medium text-gray-700">Claude 正在处理中...</p>
                <p class="text-xs md:text-sm mt-2">（视内容复杂度，可能需要 5-30 秒）</p>
            </div>

            <!-- 原型渲染区 -->
            <iframe id="previewFrame" class="flex-1 border border-gray-200 rounded-md w-full h-full bg-gray-50 min-h-[350px]"></iframe>

            <!-- 代码展示区 -->
            <textarea id="codeView" class="hidden flex-1 border border-gray-200 p-3 md:p-4 rounded-md resize-none font-mono text-xs md:text-sm bg-gray-900 text-green-400 min-h-[350px]" readonly></textarea>

            <!-- 【改动点 2】新增：自然语言微调输入区（初始隐藏，生成出原型后才显示） -->
            <div id="fineTuneArea" class="hidden mt-3 pt-3 border-t border-gray-200 flex-col md:flex-row space-y-2 md:space-y-0 md:space-x-2 shrink-0">
                <input type="text" id="fineTuneInput" placeholder="直接告诉AI怎么改，例如：把导航栏变成深蓝色、增加一个底部菜单..." class="flex-1 border border-gray-300 p-2.5 rounded-md focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-sm">
                <button id="fineTuneBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-md font-bold transition-colors shadow flex justify-center items-center text-sm md:w-auto w-full">
                    🪄 对话微调
                </button>
            </div>
        </div>
    </div>

    <script>
        // === 核心机制：对话上下文记忆数组 ===
        let conversationHistory =[];
        const systemPrompt = `你是一个资深的前端工程师和UI/UX设计专家。你的任务是根据用户的需求，生成或修改网页原型图。
要求：
1. 只输出完整的、可运行的单文件 HTML 代码（不管怎么修改，每次都要返回一整个完整的HTML，不要只返回片段代码）。
2. 必须在 <head> 中通过 CDN 引入 Tailwind CSS (<script src="https://cdn.tailwindcss.com"><\/script>) 来进行页面美化。
3. 界面设计要符合现代移动优先(Mobile-First)的标准，必须完美适配手机和PC端屏幕。
4. 如果有交互需求，可以使用原生 JavaScript 实现简单的界面切换、弹窗等效果。
5. 【重要】只返回 <!DOCTYPE html> 开头的纯 HTML 代码，不要用 markdown 代码块包裹，不要包含任何解释文字。`;

        // === 提取通用的 API 调用函数 (支持上下文消息数组) ===
        async function callClaudeAPI(messagesArray) {
            const apiKey = document.getElementById('apiKey').value.trim();
            let rawUrl = document.getElementById('apiUrl').value.trim();

            if (!rawUrl) throw new Error("请输入 API 代理接口地址！");
            if (!apiKey) throw new Error("请输入 Claude API Key！");

            let baseUrl = rawUrl.replace(/\/$/, '');
            if (baseUrl.endsWith('/v1')) baseUrl = baseUrl.slice(0, -3);
            const fetchUrl = `${baseUrl}/v1/messages`;

            const response = await fetch(fetchUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': apiKey,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerously-allow-browser': 'true',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'claude-3-5-sonnet-20241022',
                    max_tokens: 8000,
                    system: systemPrompt,
                    messages: messagesArray // 直接传入历史记录数组
                })
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                let errorMsg = errorData.error?.message || errorData.message || `状态码: ${response.status}`;
                throw new Error(`请求接口失败\n错误详情: ${errorMsg}`);
            }

            const data = await response.json();

            if (data.choices && data.choices.length > 0 && data.choices[0].message) {
                return data.choices[0].message.content; // OpenAI 格式兼容
            } else if (data.content && data.content.length > 0) {
                return data.content[0].text; // Anthropic 原生格式
            } else {
                throw new Error('未知的 API 响应格式，请检查代理设置。');
            }
        }


        // === 1. 语音识别逻辑 ===
        // (与之前相同，不做赘述...)
        const recordBtn = document.getElementById('recordBtn');
        const recordText = document.getElementById('recordText');
        const recordIcon = document.getElementById('recordIcon');
        const minutesArea = document.getElementById('minutes');

        let isRecording = false;
        let recognition = null;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'zh-CN';

            recognition.onresult = function(event) {
                let final_transcript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) final_transcript += event.results[i][0].transcript + '，';
                }
                if(final_transcript) {
                    minutesArea.value += final_transcript;
                    minutesArea.scrollTop = minutesArea.scrollHeight;
                }
            };
            recognition.onerror = function(event) {
                if(event.error === 'not-allowed') {
                    alert("请允许浏览器使用麦克风权限！");
                    stopRecording();
                }
            };
        } else {
            recordBtn.onclick = () => alert('您的浏览器不支持原生语音识别，请手动输入。');
        }

        function startRecording() {
            if(!recognition) return;
            recognition.start();
            isRecording = true;
            recordText.innerText = '停止录音';
            recordIcon.innerText = '⏹️';
            recordBtn.classList.replace('bg-red-50', 'bg-red-600');
            recordBtn.classList.replace('text-red-600', 'text-white');
            recordBtn.classList.add('animate-pulse');
        }

        function stopRecording() {
            if(!recognition) return;
            recognition.stop();
            isRecording = false;
            recordText.innerText = '语音录入';
            recordIcon.innerText = '🎙️';
            recordBtn.classList.replace('bg-red-600', 'bg-red-50');
            recordBtn.classList.replace('text-white', 'text-red-600');
            recordBtn.classList.remove('animate-pulse');
        }

        recordBtn.addEventListener('click', () => { isRecording ? stopRecording() : startRecording(); });


        // === 2. AI 梳理纪要逻辑 ===
        const refineBtn = document.getElementById('refineBtn');
        const refineText = document.getElementById('refineText');
        const refineIcon = document.getElementById('refineIcon');

        refineBtn.addEventListener('click', async () => {
            const rawText = minutesArea.value.trim();
            if(!rawText) { alert("文本框为空，请先录音或输入内容！"); return; }

            refineBtn.disabled = true;
            refineText.innerText = '正在提炼...';
            refineIcon.innerText = '⏳';
            refineBtn.classList.replace('bg-purple-50', 'bg-gray-200');
            refineBtn.classList.replace('text-purple-600', 'text-gray-500');

            try {
                // 梳理纪要不需要记忆上下文，单次发送即可
                const prompt = `将以下口语化的会议记录提炼成结构清晰的前端UI需求文档。剔除废话，只保留核心结构、元素、交互。输出纯文本：\n\n${rawText}`;
                const refinedText = await callClaudeAPI([{ role: 'user', content: prompt }]);
                minutesArea.value = refinedText;
            } catch (error) {
                alert(`提炼失败: ${error.message}`);
            } finally {
                refineBtn.disabled = false;
                refineText.innerText = 'AI 梳理纪要';
                refineIcon.innerText = '🤖';
                refineBtn.classList.replace('bg-gray-200', 'bg-purple-50');
                refineBtn.classList.replace('text-gray-500', 'text-purple-600');
            }
        });


        // === UI 状态切换提取函数 ===
        const generateBtn = document.getElementById('generateBtn');
        const fineTuneBtn = document.getElementById('fineTuneBtn');
        const fineTuneInput = document.getElementById('fineTuneInput');
        const fineTuneArea = document.getElementById('fineTuneArea');
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loadingText');
        const previewFrame = document.getElementById('previewFrame');
        const codeView = document.getElementById('codeView');

        function startLoading(text) {
            previewFrame.classList.add('hidden');
            codeView.classList.add('hidden');
            loading.classList.remove('hidden');
            loading.classList.add('flex');
            loadingText.innerText = text;
        }

        function stopLoading() {
            loading.classList.remove('flex');
            loading.classList.add('hidden');
            // 依据当前 Tab 状态显示
            if (document.getElementById('tabPreview').classList.contains('text-blue-600')) {
                previewFrame.classList.remove('hidden');
            } else {
                codeView.classList.remove('hidden');
            }
        }

        // === 3. 生成原型逻辑 (初次生成) ===
        generateBtn.addEventListener('click', async () => {
            const minutes = minutesArea.value.trim();
            if (!minutes) return alert("需求内容为空，请先录入需求！");

            generateBtn.disabled = true; generateBtn.innerText = '生成中...'; generateBtn.classList.replace('bg-blue-600', 'bg-gray-400');
            startLoading('Claude 正在思考并绘制初始原型...');

            try {
                // 每次点击【召唤生成】代表开新局，清空聊天记忆
                conversationHistory =[];
                // 记录用户的第一句话
                conversationHistory.push({ role: 'user', content: `这是我们的会议纪要/需求，请帮我生成原型图：\n\n${minutes}` });

                let rawResponse = await callClaudeAPI(conversationHistory);

                // 将 Claude 返回的代码加入记忆，这样它下次微调才知道改的是什么
                conversationHistory.push({ role: 'assistant', content: rawResponse });

                let htmlContent = rawResponse;
                const match = htmlContent.match(/```html\s*([\s\S]*?)```/);
                if (match) htmlContent = match[1];

                codeView.value = htmlContent;
                previewFrame.srcdoc = htmlContent;

                // 生成成功后，显示微调输入框
                fineTuneArea.classList.remove('hidden');
                fineTuneArea.classList.add('flex');
                document.getElementById('tabPreview').click();

                if (window.innerWidth < 768) previewFrame.scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                alert(`${error.message}`);
            } finally {
                stopLoading();
                generateBtn.disabled = false; generateBtn.innerHTML = '✨ 重新生成原型'; generateBtn.classList.replace('bg-gray-400', 'bg-blue-600');
            }
        });

        // === 4. 对话微调逻辑 (二次修改) ===
        fineTuneBtn.addEventListener('click', async () => {
            const instruct = fineTuneInput.value.trim();
            if (!instruct) return alert("请输入需要修改的具体要求！");

            fineTuneBtn.disabled = true; fineTuneBtn.innerText = '修改中...';
            startLoading('Claude 正在根据你的指示修改页面...');

            try {
                // 把用户的修改要求加到历史记忆中
                conversationHistory.push({ role: 'user', content: `请帮我修改当前页面，要求如下：\n${instruct}\n\n注意：必须返回一整个完整的、修改后的 HTML 代码，不要用语言解释，不要只发修改片段。` });

                let rawResponse = await callClaudeAPI(conversationHistory);

                // 更新助理记忆
                conversationHistory.push({ role: 'assistant', content: rawResponse });

                let htmlContent = rawResponse;
                const match = htmlContent.match(/```html\s*([\s\S]*?)```/);
                if (match) htmlContent = match[1];

                codeView.value = htmlContent;
                previewFrame.srcdoc = htmlContent;

                // 成功后清空微调输入框，方便下一次输入
                fineTuneInput.value = '';

            } catch (error) {
                alert(`修改失败: ${error.message}`);
                // 如果失败，把刚才那条没成功的修改要求弹出来，防止上下文错乱
                conversationHistory.pop();
            } finally {
                stopLoading();
                fineTuneBtn.disabled = false; fineTuneBtn.innerText = '🪄 对话微调';
            }
        });

        // 绑定回车键触发微调
        fineTuneInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') fineTuneBtn.click();
        });

        // === 5. 视图/源码 Tab 切换 ===
        const tabPreview = document.getElementById('tabPreview');
        const tabCode = document.getElementById('tabCode');

        tabPreview.addEventListener('click', () => {
            tabPreview.classList.add('text-blue-600', 'font-bold', 'border-blue-600');
            tabPreview.classList.remove('text-gray-500');
            tabCode.classList.remove('text-blue-600', 'font-bold', 'border-blue-600');
            tabCode.classList.add('text-gray-500');
            codeView.classList.add('hidden');
            previewFrame.classList.remove('hidden');
        });

        tabCode.addEventListener('click', () => {
            tabCode.classList.add('text-blue-600', 'font-bold', 'border-blue-600');
            tabCode.classList.remove('text-gray-500');
            tabPreview.classList.remove('text-blue-600', 'font-bold', 'border-blue-600');
            tabPreview.classList.add('text-gray-500');
            previewFrame.classList.add('hidden');
            codeView.classList.remove('hidden');
        });
    </script>
</body>
</html>
