<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI会议原型生成器 - PM专属神器</title>
    <!-- 引入 Tailwind CSS 让界面更好看 -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans">

    <!-- 顶部导航栏 -->
    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center z-10">
        <div class="flex items-center space-x-3">
            <span class="text-2xl">🚀</span>
            <h1 class="text-xl font-bold">AI 会议原型生成器</h1>
        </div>
        <div class="flex items-center space-x-3">
            <div class="flex flex-col">
                <label class="text-xs text-blue-200 mb-1">API 代理接口 (Base URL):</label>
                <!-- 默认值帮你留空，你可以填入你的 http://1.95.142.151:3000/v1 -->
                <input type="text" id="apiUrl" placeholder="例如: http://1.95.142.151:3000/v1" class="text-black px-2 py-1.5 rounded w-56 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
            </div>
            <div class="flex flex-col">
                <label class="text-xs text-blue-200 mb-1">Claude API Key:</label>
                <input type="password" id="apiKey" placeholder="sk-ant-..." class="text-black px-2 py-1.5 rounded w-56 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
            </div>
        </div>
    </header>

    <!-- 主工作区 -->
    <div class="flex-1 flex overflow-hidden p-4 space-x-4">

        <!-- 左侧：输入与控制面板 -->
        <div class="w-1/3 flex flex-col space-y-4 bg-white p-5 rounded-lg shadow border border-gray-100">
            <div class="flex justify-between items-center">
                <h2 class="font-bold text-gray-800 text-lg">📝 会议纪要</h2>
                <button id="recordBtn" class="bg-red-50 px-3 py-1.5 rounded-full text-red-600 font-medium hover:bg-red-100 transition-colors flex items-center shadow-sm border border-red-200">
                    <span id="recordIcon" class="mr-1 text-lg">🎙️</span>
                    <span id="recordText">开始录音</span>
                </button>
            </div>

            <p class="text-xs text-gray-400">点击上方按钮录音，或者在此处直接输入/粘贴会议记录、需求描述。</p>

            <textarea id="minutes" class="flex-1 border border-gray-300 p-3 rounded-md resize-none focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-gray-700 leading-relaxed" placeholder="例如：页面二：宠物详情页(Pet Detail)&#10;顶部：全屏尺寸的宠物照片轮播图..."></textarea>

            <button id="generateBtn" class="bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-md font-bold text-lg transition-colors shadow-md flex justify-center items-center">
                ✨ 召唤 Claude 生成原型
            </button>
        </div>

        <!-- 右侧：预览与代码展示区 -->
        <div class="w-2/3 flex flex-col bg-white p-5 rounded-lg shadow border border-gray-100">
            <div class="flex justify-between items-center mb-3">
                <h2 class="font-bold text-gray-800 text-lg">💻 原型预览</h2>
                <div class="space-x-4 text-sm">
                    <button id="tabPreview" class="text-blue-600 font-bold border-b-2 border-blue-600 pb-1">视图</button>
                    <button id="tabCode" class="text-gray-500 hover:text-blue-600 pb-1">HTML源码</button>
                </div>
            </div>

            <!-- 加载动画 -->
            <div id="loading" class="hidden flex-1 flex-col items-center justify-center text-gray-500 bg-gray-50 rounded-md border border-dashed border-gray-300">
                <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-blue-600 mb-4"></div>
                <p class="text-lg font-medium text-gray-700">Claude 正在思考并绘制 UI 原型...</p>
                <p class="text-sm mt-2">（这可能需要 10-30 秒，取决于页面复杂度）</p>
            </div>

            <!-- 原型渲染区 -->
            <iframe id="previewFrame" class="flex-1 border border-gray-200 rounded-md w-full h-full bg-gray-50"></iframe>

            <!-- 代码展示区 -->
            <textarea id="codeView" class="hidden flex-1 border border-gray-200 p-4 rounded-md resize-none font-mono text-sm bg-gray-900 text-green-400" readonly></textarea>
        </div>
    </div>

    <script>
        // === 1. 语音识别逻辑 (Web Speech API) ===
        const recordBtn = document.getElementById('recordBtn');
        const recordText = document.getElementById('recordText');
        const recordIcon = document.getElementById('recordIcon');
        const minutesArea = document.getElementById('minutes');

        let isRecording = false;
        let recognition = null;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'zh-CN';

            recognition.onresult = function(event) {
                let final_transcript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        final_transcript += event.results[i][0].transcript + '，';
                    }
                }
                if(final_transcript) {
                    minutesArea.value += final_transcript;
                    minutesArea.scrollTop = minutesArea.scrollHeight;
                }
            };

            recognition.onerror = function(event) {
                console.error("语音识别错误:", event.error);
                if(event.error === 'not-allowed') {
                    alert("请允许浏览器使用麦克风权限！");
                    stopRecording();
                }
            };
        } else {
            recordBtn.onclick = () => alert('您的浏览器不支持语音识别功能，请使用最新版 Chrome 浏览器，或手动输入会议纪要。');
        }

        function startRecording() {
            if(!recognition) return;
            recognition.start();
            isRecording = true;
            recordText.innerText = '停止录音';
            recordIcon.innerText = '⏹️';
            recordBtn.classList.replace('bg-red-50', 'bg-red-600');
            recordBtn.classList.replace('text-red-600', 'text-white');
            recordBtn.classList.add('animate-pulse');
        }

        function stopRecording() {
            if(!recognition) return;
            recognition.stop();
            isRecording = false;
            recordText.innerText = '开始录音';
            recordIcon.innerText = '🎙️';
            recordBtn.classList.replace('bg-red-600', 'bg-red-50');
            recordBtn.classList.replace('text-white', 'text-red-600');
            recordBtn.classList.remove('animate-pulse');
        }

        recordBtn.addEventListener('click', () => {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        });

        // === 2. 调用 Claude API 逻辑 ===
        const generateBtn = document.getElementById('generateBtn');
        const loading = document.getElementById('loading');
        const previewFrame = document.getElementById('previewFrame');
        const codeView = document.getElementById('codeView');

        generateBtn.addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            const minutes = minutesArea.value.trim();
            let rawUrl = document.getElementById('apiUrl').value.trim();

            if (!rawUrl) {
                alert("请输入 API 代理接口地址！");
                return;
            }
            if (!apiKey) {
                alert("请输入 Claude API Key！");
                return;
            }
            if (!minutes) {
                alert("会议纪要为空，请先录音或手动输入需求！");
                return;
            }

            // 智能处理 URL：去除结尾的斜杠，以及结尾的 /v1 防止拼接重复
            let baseUrl = rawUrl.replace(/\/$/, '');
            if (baseUrl.endsWith('/v1')) {
                baseUrl = baseUrl.slice(0, -3); // 截断结尾的 /v1
            }

            // 最终的请求地址
            const fetchUrl = `${baseUrl}/v1/messages`;

            previewFrame.classList.add('hidden');
            codeView.classList.add('hidden');
            loading.classList.remove('hidden');
            loading.classList.add('flex');
            generateBtn.disabled = true;
            generateBtn.innerText = '请求中...';
            generateBtn.classList.replace('bg-blue-600', 'bg-gray-400');

            try {
                const systemPrompt = `你是一个资深的前端工程师和UI/UX设计专家。你的任务是根据用户的会议纪要或需求描述，生成一个高质量、美观、响应式的网页原型图。
要求：
1. 只输出完整的、可运行的单文件 HTML 代码。
2. 必须在 <head> 中通过 CDN 引入 Tailwind CSS (<script src="https://cdn.tailwindcss.com"><\/script>) 来进行页面美化。
3. 界面设计要符合现代企业级应用的标准（合理的内边距、好看的色彩搭配、清晰的层级结构）。
4. 如果有交互需求，可以使用原生 JavaScript 实现简单的界面切换、弹窗等效果。
5. 【重要】只返回 <!DOCTYPE html> 开头的纯 HTML 代码，不要用 markdown 代码块包裹，不要包含任何解释性文字。`;

                const response = await fetch(fetchUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01',
                        'anthropic-dangerously-allow-browser': 'true',
                        'Authorization': `Bearer ${apiKey}` // 兼容 OneAPI 等代理的身份验证
                    },
                    body: JSON.stringify({
                        model: 'claude-3-5-sonnet-20241022',
                        max_tokens: 8000,
                        system: systemPrompt,
                        messages:[
                            { role: 'user', content: `这是我们的会议纪要/需求，请帮我生成原型图：\n\n${minutes}` }
                        ]
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    let errorMsg = errorData.error?.message || errorData.message || `状态码: ${response.status}`;
                    throw new Error(`请求接口失败\n错误详情: ${errorMsg}\n\n当前请求的完整地址是: ${fetchUrl}`);
                }

                const data = await response.json();

                // 兼容不同代理返回的数据结构 (有些代理包装成了 OpenAI 格式)
                let htmlContent = '';
                if (data.choices && data.choices.length > 0 && data.choices[0].message) {
                    htmlContent = data.choices[0].message.content; // OpenAI 格式
                } else if (data.content && data.content.length > 0) {
                    htmlContent = data.content[0].text; // Anthropic 原生格式
                } else {
                    throw new Error('未知的 API 响应格式，请检查你的代理设置。');
                }

                const match = htmlContent.match(/```html\s*([\s\S]*?)```/);
                if (match) {
                    htmlContent = match[1];
                }

                codeView.value = htmlContent;
                previewFrame.srcdoc = htmlContent;

                loading.classList.remove('flex');
                loading.classList.add('hidden');
                previewFrame.classList.remove('hidden');

                document.getElementById('tabPreview').click();

            } catch (error) {
                console.error(error);
                alert(`${error.message}`);
                loading.classList.remove('flex');
                loading.classList.add('hidden');
                previewFrame.classList.remove('hidden');
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerHTML = '✨ 重新生成原型';
                generateBtn.classList.replace('bg-gray-400', 'bg-blue-600');
            }
        });

        // === 3. 视图/源码 Tab 切换 ===
        const tabPreview = document.getElementById('tabPreview');
        const tabCode = document.getElementById('tabCode');

        tabPreview.addEventListener('click', () => {
            tabPreview.classList.add('text-blue-600', 'font-bold', 'border-blue-600');
            tabPreview.classList.remove('text-gray-500');
            tabCode.classList.remove('text-blue-600', 'font-bold', 'border-blue-600');
            tabCode.classList.add('text-gray-500');

            codeView.classList.add('hidden');
            previewFrame.classList.remove('hidden');
        });

        tabCode.addEventListener('click', () => {
            tabCode.classList.add('text-blue-600', 'font-bold', 'border-blue-600');
            tabCode.classList.remove('text-gray-500');
            tabPreview.classList.remove('text-blue-600', 'font-bold', 'border-blue-600');
            tabPreview.classList.add('text-gray-500');

            previewFrame.classList.add('hidden');
            codeView.classList.remove('hidden');
        });
    </script>
</body>
</html>
